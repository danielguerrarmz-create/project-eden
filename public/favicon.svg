<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Bower company mark, "Oculus" (locked 2026-07-06): eight overlapping circles of
       radius 30 on a radius-15 ring about (50,50). Ink on warm paper; the single
       olive accent circle marks the living state, the app-icon usage the mark reserves.
       Geometry mirrors src/ui/OculusMark.tsx exactly — do not eyeball-adjust. -->
  <rect width="100" height="100" rx="22" fill="#FBF9F3"/>
  <g stroke="#17160F" stroke-width="3" fill="none" stroke-linecap="round">
    <circle cx="65" cy="50" r="30"/>
    <circle cx="60.61" cy="60.61" r="30" stroke="#ACC13A"/>
    <circle cx="50" cy="65" r="30"/>
    <circle cx="39.39" cy="60.61" r="30"/>
    <circle cx="35" cy="50" r="30"/>
    <circle cx="39.39" cy="39.39" r="30"/>
    <circle cx="50" cy="35" r="30"/>
    <circle cx="60.61" cy="39.39" r="30"/>
  </g>
</svg>
