<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bower</title>
    <meta
      name="description"
      content="Shape an organic timber gridshell like clay while a guaranteed fixed price moves live beside it. Every reachable form compiles to flat CNC components, an assembly sequence and a price, and the lattice is designed for the climbing plant that will grow into it, greener and more alive with every season."
    />
    <meta name="theme-color" content="#FBF9F3" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Social cards -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Bower: shape a living pavilion, priced fixed as you shape it" />
    <meta
      property="og:description"
      content="A generative design engine constrained by a fabrication grammar: every form you can touch is buildable, priceable, and designed for the plant that grows through it."
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Bower: shape a living pavilion, priced fixed as you shape it" />
    <meta
      name="twitter:description"
      content="A generative design engine constrained by a fabrication grammar: every form you can touch is buildable, priceable, and designed for the plant that grows through it."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=Dancing+Script:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* One warm base tone everywhere (matches the vellum sections) so no beige/
         white seam ever shows behind transparent layers. */
      html,
      body {
        background: #fbf9f3;
      }
      /* Pre-JS loading state: a plain blank vellum field, no text. Replaced the
         moment React mounts, and toned to the intro backdrop so there is no flash. */
      #root:empty::after {
        content: '';
        position: fixed;
        inset: 0;
        background: #fbf9f3;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
